name: Question
description: Ask a question about setup, usage, or the project
labels: [question]

body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check the [documentation](https://github.com/adsreport/adsreport/tree/main/docs) and existing issues.

  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish? This helps us give a better answer.
