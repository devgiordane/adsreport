name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]

body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you're running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - UI / Dashboard
        - Data sync / Facebook API
        - Settings / Configuration
        - Authentication
        - i18n / Localization
        - Docker / Packaging
        - Documentation
        - Other
    validations:
      required: true
