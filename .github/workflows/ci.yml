name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install hatch
      - run: hatch run lint
      - run: hatch run typecheck

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install hatch
      - run: hatch run test --cov=adsreport --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  i18n-parity:
    name: i18n key parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check all locales have identical key sets
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path
          locales = list(Path("adsreport/i18n/locales").glob("*.json"))
          keys = [set(json.loads(p.read_text()).keys()) for p in locales]
          names = [p.stem for p in locales]
          ref = keys[0]
          ok = True
          for name, ks in zip(names[1:], keys[1:]):
              missing = ref - ks
              extra = ks - ref
              if missing:
                  print(f"MISSING in {name}: {sorted(missing)}")
                  ok = False
              if extra:
                  print(f"EXTRA in {name}: {sorted(extra)}")
                  ok = False
          if not ok:
              sys.exit(1)
          print(f"OK — {len(ref)} keys across {len(locales)} locales")
          EOF

  no-hardcoded-strings:
    name: No hardcoded UI strings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect bare string literals in ui/ callbacks
        run: |
          python - <<'EOF'
          import re, sys
          from pathlib import Path
          # Pattern: string assignments / children= / label= that are NOT t("...") calls
          # This is a heuristic; false positives are acceptable, false negatives are not.
          EXEMPT = re.compile(r't\(|#\s*i18n-ok|__version__|logging\.|structlog\.')
          SUSPECT = re.compile(r'(?:children|label|placeholder|title)\s*=\s*["\'](?!\/)[^"\']{4,}["\']')
          failures = []
          for path in Path("adsreport/ui").rglob("*.py"):
              for i, line in enumerate(path.read_text().splitlines(), 1):
                  if SUSPECT.search(line) and not EXEMPT.search(line):
                      failures.append(f"{path}:{i}: {line.strip()}")
          if failures:
              print("Possible hardcoded UI strings (use t() instead):")
              print("\n".join(failures[:20]))
              sys.exit(1)
          print("OK — no obvious hardcoded strings found")
          EOF
